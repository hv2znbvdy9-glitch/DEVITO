# AVA Adaptive Security - Docker Compose
# Für lokale Entwicklung und Testing

version: '3.8'

services:
  # Orchestrator
  orchestrator:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.adaptive
    image: ava-security/adaptive-orchestrator:4.0
    container_name: ava-orchestrator
    hostname: orchestrator
    environment:
      - LOG_LEVEL=INFO
      - NODE_TYPE=cloud
      - METRICS_PORT=9090
      - MESH_PORT=8765
      - AVA_HOME=/data/ava
    ports:
      - "9090:9090"  # Metrics
      - "8765:8765"  # Mesh
    volumes:
      - ava-patterns:/data/ava
    networks:
      - ava-security
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Network IDS (Edge Node)
  network-ids:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.adaptive
    image: ava-security/adaptive-ids:4.0
    container_name: ava-network-ids
    hostname: ids-edge-1
    environment:
      - LOG_LEVEL=INFO
      - NODE_TYPE=edge
      - AUTO_BLACKLIST=true
      - TRUST_THRESHOLD=50
      - AVA_HOME=/data/ava
    command: ["python", "-m", "ava.security.adaptive_ids"]
    volumes:
      - ava-patterns:/data/ava
    networks:
      - ava-security
    restart: unless-stopped
    cap_add:
      - NET_ADMIN  # Required for network scanning

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: ava-prometheus
    hostname: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9091:9090"  # External port 9091 to avoid conflict
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - ava-security
    restart: unless-stopped
    depends_on:
      - orchestrator

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: ava-grafana
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=ava_security_admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/ava-adaptive-security-dashboard.json:/etc/grafana/provisioning/dashboards/ava-adaptive-security.json
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml
    networks:
      - ava-security
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  ava-security:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  ava-patterns:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
