---
apiVersion: v1
kind: Namespace
metadata:
  name: ava-system
  labels:
    name: ava-system
    istio-injection: enabled  # Falls Istio verwendet wird

---
# ConfigMap für Konfiguration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ava-grpc-config
  namespace: ava-system
data:
  AVA_GRPC_BIND: "0.0.0.0"  # In K8s: alle Interfaces
  AVA_GRPC_PORT: "50051"
  AVA_ENV: "production"
  PYTHONUNBUFFERED: "1"

---
# Secret für TLS-Zertifikate (aus Cert-Manager oder manuell)
apiVersion: v1
kind: Secret
metadata:
  name: ava-grpc-tls
  namespace: ava-system
type: kubernetes.io/tls
data:
  # Base64-encodierte Zertifikate
  # Befüllen mit: kubectl create secret tls ava-grpc-tls --cert=server.crt --key=server.key -n ava-system
  tls.crt: ""  # Server-Zertifikat (Base64)
  tls.key: ""  # Private Key (Base64)
  ca.crt: ""   # CA-Zertifikat (Base64)

---
# Secret für API-Keys (aus Vault oder manuell)
apiVersion: v1
kind: Secret
metadata:
  name: ava-grpc-secrets
  namespace: ava-system
type: Opaque
data:
  # Base64-encodierte Secrets
  # Erstellen mit: echo -n "secret-value" | base64
  api-key: ""      # AVA_GRPC_TOKEN
  jwt-secret: ""   # AVA_JWT_SECRET

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ava-grpc
  namespace: ava-system
  labels:
    app: ava-grpc
    version: v2.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ava-grpc
  template:
    metadata:
      labels:
        app: ava-grpc
        version: v2.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ava-grpc
      
      # Security Context (Pod-Level)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Init Container für Vault-Integration (optional)
      initContainers:
      - name: vault-init
        image: vault:latest
        command:
        - sh
        - -c
        - |
          # Vault-Secrets laden und in Shared-Volume schreiben
          # (nur wenn Vault verwendet wird)
          echo "Vault integration disabled in this example"
        volumeMounts:
        - name: shared-secrets
          mountPath: /secrets
      
      containers:
      - name: ava-grpc
        image: ghcr.io/ava-system/ava-grpc:2.0.0  # Anpassen!
        imagePullPolicy: Always
        
        ports:
        - name: grpc
          containerPort: 50051
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        env:
        # ConfigMap
        - name: AVA_GRPC_BIND
          valueFrom:
            configMapKeyRef:
              name: ava-grpc-config
              key: AVA_GRPC_BIND
        - name: AVA_GRPC_PORT
          valueFrom:
            configMapKeyRef:
              name: ava-grpc-config
              key: AVA_GRPC_PORT
        - name: AVA_ENV
          valueFrom:
            configMapKeyRef:
              name: ava-grpc-config
              key: AVA_ENV
        
        # Secrets
        - name: AVA_GRPC_TOKEN
          valueFrom:
            secretKeyRef:
              name: ava-grpc-secrets
              key: api-key
        - name: AVA_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ava-grpc-secrets
              key: jwt-secret
        
        # Cert-Dir
        - name: AVA_CERT_DIR
          value: "/certs"
        
        volumeMounts:
        # TLS-Zertifikate
        - name: tls-certs
          mountPath: /certs
          readOnly: true
        
        # Shared Secrets (für Vault)
        - name: shared-secrets
          mountPath: /secrets
          readOnly: true
        
        # Logs
        - name: logs
          mountPath: /var/log/ava
        
        # Security Context (Container-Level)
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        
        # Resource Limits
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "250m"
        
        # Liveness Probe (gRPC Health-Check)
        livenessProbe:
          grpc:
            port: 50051
            service: ""  # Default Service
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness Probe
        readinessProbe:
          grpc:
            port: 50051
            service: ""
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Startup Probe
        startupProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
      
      volumes:
      # TLS-Zertifikate
      - name: tls-certs
        secret:
          secretName: ava-grpc-tls
          defaultMode: 0400
      
      # Shared für Vault-Secrets
      - name: shared-secrets
        emptyDir:
          medium: Memory
          sizeLimit: 10Mi
      
      # Logs (ephemeral)
      - name: logs
        emptyDir: {}
      
      # Pod Topology (für HA)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: ava-grpc
              topologyKey: kubernetes.io/hostname
      
      # Node Selector (optional)
      # nodeSelector:
      #   workload: ava-grpc
      
      # Tolerations (optional)
      # tolerations:
      # - key: "workload"
      #   operator: "Equal"
      #   value: "ava-grpc"
      #   effect: "NoSchedule"

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ava-grpc
  namespace: ava-system
  labels:
    app: ava-grpc

---
# Service (ClusterIP - intern)
apiVersion: v1
kind: Service
metadata:
  name: ava-grpc
  namespace: ava-system
  labels:
    app: ava-grpc
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  clusterIP: None  # Headless für direkten Pod-Zugriff
  selector:
    app: ava-grpc
  ports:
  - name: grpc
    port: 50051
    targetPort: grpc
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours

---
# Service für Metrics (separater Service)
apiVersion: v1
kind: Service
metadata:
  name: ava-grpc-metrics
  namespace: ava-system
  labels:
    app: ava-grpc
spec:
  type: ClusterIP
  selector:
    app: ava-grpc
  ports:
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP

---
# ServiceMonitor (für Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ava-grpc
  namespace: ava-system
  labels:
    app: ava-grpc
    release: prometheus  # Anpassen an Prometheus-Release-Name
spec:
  selector:
    matchLabels:
      app: ava-grpc
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http

---
# PodDisruptionBudget (für HA)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ava-grpc-pdb
  namespace: ava-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ava-grpc

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ava-grpc-hpa
  namespace: ava-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ava-grpc
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

---
# NetworkPolicy (strict Ingress-Control)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ava-grpc-netpol
  namespace: ava-system
spec:
  podSelector:
    matchLabels:
      app: ava-grpc
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Nur von spezifischen Namespaces/Pods
  - from:
    - namespaceSelector:
        matchLabels:
          name: allowed-namespace  # Anpassen!
    - podSelector:
        matchLabels:
          allowed: "true"
    ports:
    - protocol: TCP
      port: 50051
  
  # Prometheus Scraping
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
  
  egress:
  # DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  
  # Vault (falls extern)
  - to:
    - podSelector:
        matchLabels:
          app: vault
    ports:
    - protocol: TCP
      port: 8200
  
  # Externe APIs (falls benötigt)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
