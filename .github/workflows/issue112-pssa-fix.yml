name: Issue 112 One-Time PSScriptAnalyzer Fix

on:
  push:
    paths:
      - '.github/workflows/issue112-pssa-fix.yml'
  pull_request:
    paths:
      - '.github/workflows/issue112-pssa-fix.yml'

permissions:
  contents: write

jobs:
  patch-lint-and-push:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-112-neuro-tangle-safe-cleanup
          show-progress: false

      - name: Rename pure New functions to Get functions
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $path = 'scripts/AVA_NeuroTangle_Guardian_v1_SAFE.ps1'
          $content = Get-Content -LiteralPath $path -Raw -Encoding UTF8
          $content = $content.Replace('New-AVABaselineShape', 'Get-AVABaselineShape')
          $content = $content.Replace('New-AVAAnalysis', 'Get-AVAAnalysis')
          Set-Content -LiteralPath $path -Value $content -Encoding UTF8 -NoNewline
          .\scripts\Test_AVA_NeuroTangle_Guardian_v1_SAFE.ps1

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Verify targeted lint
        shell: pwsh
        run: |
          $excludeRules = @('PSAvoidUsingWriteHost')
          $files = @(
            'scripts/AVA_NeuroTangle_Guardian_v1_SAFE.ps1',
            'scripts/Test_AVA_NeuroTangle_Guardian_v1_SAFE.ps1'
          )
          $results = @($files | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -Severity Warning, Error -ExcludeRule $excludeRules
          })
          if ($results.Count -gt 0) {
            $results | Format-List *
            throw 'Targeted lint still reports findings.'
          }

      - name: Commit naming fix
        shell: powershell
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/AVA_NeuroTangle_Guardian_v1_SAFE.ps1
          git commit -m 'fix: rename pure AVA builders for PSScriptAnalyzer'
          git push origin HEAD:fix/issue-112-neuro-tangle-safe-cleanup
