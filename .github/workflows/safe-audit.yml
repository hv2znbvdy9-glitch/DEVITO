name: AVA Safe Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/safe-audit.yml'
      - 'scripts/AVA_SOC_CORE.ps1'
      - 'scripts/AVA_SOC_CORE_CLEANED.ps1'

permissions:
  contents: read

jobs:
  safe-audit:
    name: Inventory, parse, sanitize, isolated test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout without persisted credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Inventory and SHA-256
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $Out = Join-Path $env:RUNNER_TEMP 'ava-safe-audit'
          New-Item -ItemType Directory -Path $Out -Force | Out-Null

          $Files = @(
            git ls-files |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Sort-Object
          )

          $Inventory = foreach ($RelativePath in $Files) {
            $FullPath = Join-Path $PWD $RelativePath
            if (-not (Test-Path -LiteralPath $FullPath -PathType Leaf)) {
              continue
            }

            $Item = Get-Item -LiteralPath $FullPath
            [pscustomobject]@{
              path = $RelativePath
              size_bytes = $Item.Length
              sha256 = (Get-FileHash -LiteralPath $FullPath -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          }

          $Inventory |
            ConvertTo-Json -Depth 4 |
            Set-Content -LiteralPath (Join-Path $Out 'inventory.sha256.json') -Encoding UTF8

          $Inventory |
            Export-Csv -LiteralPath (Join-Path $Out 'inventory.sha256.csv') -NoTypeInformation -Encoding UTF8

          Write-Host "[AVA] inventoried and hashed $($Inventory.Count) tracked files."

      - name: Parse every PowerShell file statically
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $Out = Join-Path $env:RUNNER_TEMP 'ava-safe-audit'
          $Results = [System.Collections.Generic.List[object]]::new()
          $HasErrors = $false

          $PowerShellFiles = @(
            Get-ChildItem -LiteralPath $PWD -Recurse -File -Filter '*.ps1' |
              Where-Object { $_.FullName -notmatch '[\\/]\.git[\\/]' } |
              Sort-Object FullName
          )

          foreach ($File in $PowerShellFiles) {
            $Tokens = $null
            $ParseErrors = $null
            $Ast = [System.Management.Automation.Language.Parser]::ParseFile(
              $File.FullName,
              [ref]$Tokens,
              [ref]$ParseErrors
            )

            $Errors = @($ParseErrors | ForEach-Object {
              [pscustomobject]@{
                message = $_.Message
                line = $_.Extent.StartLineNumber
                column = $_.Extent.StartColumnNumber
              }
            })

            if ($Errors.Count -gt 0) {
              $HasErrors = $true
            }

            $Results.Add([pscustomobject]@{
              path = [IO.Path]::GetRelativePath($PWD.Path, $File.FullName)
              parsed = ($Errors.Count -eq 0)
              token_count = @($Tokens).Count
              function_count = @($Ast.FindAll({
                param($Node)
                $Node -is [System.Management.Automation.Language.FunctionDefinitionAst]
              }, $true)).Count
              errors = $Errors
            })
          }

          $Results |
            ConvertTo-Json -Depth 8 |
            Set-Content -LiteralPath (Join-Path $Out 'powershell-parse-results.json') -Encoding UTF8

          if ($HasErrors) {
            $Results | Where-Object { -not $_.parsed } | Format-List | Out-String | Write-Host
            throw 'Static PowerShell parsing found syntax errors.'
          }

          Write-Host "[AVA] statically parsed $($Results.Count) PowerShell files without executing them."

      - name: Verify dangerous capabilities are absent from cleaned script
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $Out = Join-Path $env:RUNNER_TEMP 'ava-safe-audit'
          $SourcePath = Join-Path $PWD 'scripts/AVA_SOC_CORE.ps1'
          $CleanPath = Join-Path $PWD 'scripts/AVA_SOC_CORE_CLEANED.ps1'

          $ForbiddenCommands = @(
            'Add-Content', 'Clear-Content', 'Copy-Item', 'Invoke-Command',
            'Invoke-Expression', 'Invoke-RestMethod', 'Invoke-WebRequest',
            'New-Item', 'New-NetFirewallRule', 'Register-ScheduledTask',
            'Remove-Item', 'Remove-NetFirewallRule', 'Remove-ItemProperty',
            'Restart-Service', 'Set-Content', 'Set-Item', 'Set-ItemProperty',
            'Set-NetFirewallRule', 'Set-Service', 'Start-BitsTransfer',
            'Start-Process', 'Start-Service', 'Stop-Process', 'Stop-Service',
            'Unregister-ScheduledTask'
          )

          function Get-AstInfo {
            param([Parameter(Mandatory)][string]$Path)

            $Tokens = $null
            $Errors = $null
            $Ast = [System.Management.Automation.Language.Parser]::ParseFile(
              $Path,
              [ref]$Tokens,
              [ref]$Errors
            )
            if (@($Errors).Count -gt 0) {
              throw "Parse failed: $Path"
            }

            $Commands = @(
              $Ast.FindAll({
                param($Node)
                $Node -is [System.Management.Automation.Language.CommandAst]
              }, $true) |
                ForEach-Object { $_.GetCommandName() } |
                Where-Object { $_ } |
                Sort-Object -Unique
            )

            $Functions = @(
              $Ast.FindAll({
                param($Node)
                $Node -is [System.Management.Automation.Language.FunctionDefinitionAst]
              }, $true) |
                ForEach-Object { $_.Name } |
                Sort-Object -Unique
            )

            [pscustomobject]@{
              ast = $Ast
              commands = $Commands
              functions = $Functions
            }
          }

          $Source = Get-AstInfo -Path $SourcePath
          $Clean = Get-AstInfo -Path $CleanPath
          $CleanText = Get-Content -LiteralPath $CleanPath -Raw

          $CommandViolations = @($Clean.commands | Where-Object { $_ -in $ForbiddenCommands })
          $TextViolations = [System.Collections.Generic.List[string]]::new()

          $ForbiddenTextPatterns = [ordered]@{
            env_access = '\$env:'
            admin_requirement = '(?im)^\s*#requires\s+-RunAsAdministrator'
            network_types = '(?i)System\.Net|Net\.WebClient|HttpClient|TcpClient|UdpClient'
            registry_paths = '(?i)HKLM:|HKCU:|Registry::'
            encoded_or_dynamic = '(?i)EncodedCommand|FromBase64String|DownloadString|Invoke-Expression|\biex\b'
            secret_words = '(?i)(password|passwd|secret|token|api[_-]?key)\s*='
          }

          foreach ($Entry in $ForbiddenTextPatterns.GetEnumerator()) {
            if ($CleanText -match $Entry.Value) {
              $TextViolations.Add($Entry.Key)
            }
          }

          $SourceDangerousCommands = @($Source.commands | Where-Object { $_ -in $ForbiddenCommands })
          $RemovedFunctions = @($Source.functions | Where-Object { $_ -notin $Clean.functions })

          $Report = [pscustomobject]@{
            source = 'scripts/AVA_SOC_CORE.ps1'
            cleaned = 'scripts/AVA_SOC_CORE_CLEANED.ps1'
            source_functions = $Source.functions
            cleaned_functions = $Clean.functions
            removed_source_functions = $RemovedFunctions
            source_dangerous_commands = $SourceDangerousCommands
            cleaned_command_violations = $CommandViolations
            cleaned_text_violations = @($TextViolations)
            cleaned_sha256 = (Get-FileHash -LiteralPath $CleanPath -Algorithm SHA256).Hash.ToLowerInvariant()
          }

          $Report |
            ConvertTo-Json -Depth 8 |
            Set-Content -LiteralPath (Join-Path $Out 'sanitization-report.json') -Encoding UTF8

          if ($CommandViolations.Count -gt 0 -or $TextViolations.Count -gt 0) {
            throw 'Cleaned script contains a prohibited capability.'
          }

          if ($Clean.functions.Count -ne 1 -or $Clean.functions[0] -ne 'Get-AvaSafeAuditSummary') {
            throw 'Cleaned script must contain exactly the one approved pure function.'
          }

          Write-Host "[AVA] removed/omitted $($RemovedFunctions.Count) source functions; cleaned script passed capability checks."

      - name: Isolated test of exactly one cleaned script
        shell: bash
        run: |
          set -euo pipefail

          docker pull mcr.microsoft.com/powershell:7.4-alpine-3.20

          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --user 65534:65534 \
            --env POWERSHELL_TELEMETRY_OPTOUT=1 \
            --env DOTNET_CLI_TELEMETRY_OPTOUT=1 \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=16m \
            --mount type=bind,src="$PWD/scripts/AVA_SOC_CORE_CLEANED.ps1",dst=/work/AVA_SOC_CORE_CLEANED.ps1,readonly \
            mcr.microsoft.com/powershell:7.4-alpine-3.20 \
            pwsh -NoLogo -NoProfile -NonInteractive -File /work/AVA_SOC_CORE_CLEANED.ps1 -SelfTest \
            | tee "$RUNNER_TEMP/ava-safe-audit/isolated-test.log"

          grep -Fq '[AVA][PASS]' "$RUNNER_TEMP/ava-safe-audit/isolated-test.log"
          echo '[AVA] exactly one cleaned PowerShell script passed the isolated test.'

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ava-safe-audit-${{ github.run_id }}
          path: ${{ runner.temp }}/ava-safe-audit
          if-no-files-found: error
          retention-days: 14
