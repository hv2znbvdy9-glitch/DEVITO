name: AVA Safe Audit Read-Only

on:
  push:
    branches:
      - audit/read-only-no-network-20260718
    paths:
      - scripts/AVA_SAFE_AUDIT_READONLY_NO_NETWORK.ps1
      - .github/workflows/ava-safe-audit-readonly.yml

permissions:
  contents: read

jobs:
  safe-audit:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Static parse repository PowerShell files
        shell: pwsh
        run: |
          $rows = foreach ($file in Get-ChildItem -LiteralPath "$PWD/scripts" -Filter '*.ps1' -File -Recurse) {
            $tokens = $null
            $errors = $null
            [Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null

            [pscustomobject]@{
              Path = [IO.Path]::GetRelativePath($PWD, $file.FullName)
              SHA256 = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              ParseOk = (@($errors).Count -eq 0)
              ParseErrorCount = @($errors).Count
            }
          }

          $summary = [pscustomobject]@{
            Files = @($rows).Count
            ParseFailures = @($rows | Where-Object { -not $_.ParseOk }).Count
            Results = @($rows)
          }

          Write-Host ($summary | ConvertTo-Json -Depth 6 -Compress)

      - name: Verify cleaned script safety profile
        shell: pwsh
        run: |
          $scriptPath = Join-Path $PWD 'scripts/AVA_SAFE_AUDIT_READONLY_NO_NETWORK.ps1'
          $tokens = $null
          $errors = $null
          $ast = [Management.Automation.Language.Parser]::ParseFile(
            $scriptPath,
            [ref]$tokens,
            [ref]$errors
          )

          if (@($errors).Count -gt 0) {
            $errors | ForEach-Object { Write-Host $_.Message }
            throw 'Cleaned script has PowerShell parse errors.'
          }

          $forbidden = @(
            'Add-Content','Clear-Content','Compress-Archive','Copy-Item',
            'Disable-NetFirewallRule','Enable-NetFirewallRule','Expand-Archive',
            'Export-Csv','Invoke-Command','Invoke-Expression','Invoke-RestMethod',
            'Invoke-WebRequest','Move-Item','New-Item','New-ItemProperty',
            'New-NetFirewallRule','Out-File','Register-ScheduledTask','Remove-Item',
            'Remove-ItemProperty','Remove-NetFirewallRule','Restart-Service',
            'Set-Acl','Set-Content','Set-Item','Set-ItemProperty',
            'Set-NetFirewallProfile','Set-Service','Start-BitsTransfer','Start-Job',
            'Start-Process','Start-Service','Stop-Process','Stop-Service',
            'Unregister-ScheduledTask','Get-NetAdapter','Get-NetConnectionProfile',
            'Get-NetIPConfiguration','Get-NetIPAddress','Get-NetNeighbor',
            'Get-NetTCPConnection','Resolve-DnsName','Test-NetConnection'
          )

          $commands = @(
            $ast.FindAll(
              { param($node) $node -is [Management.Automation.Language.CommandAst] },
              $true
            ) | ForEach-Object { $_.GetCommandName() } |
              Where-Object { $_ } | Sort-Object -Unique
          )

          $violations = @($commands | Where-Object { $_ -in $forbidden })
          if ($violations.Count -gt 0) {
            throw "Forbidden executable commands found: $($violations -join ', ')"
          }

          $raw = Get-Content -LiteralPath $scriptPath -Raw
          if ($raw -match '(?im)^\s*\$(password|passwd|pwd|secret|token|api[_-]?key|authorization|credential)\s*=') {
            throw 'Secret-like assignment found.'
          }

          $hash = (Get-FileHash -LiteralPath $scriptPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "CLEAN_SCRIPT_SHA256=$hash"
          Write-Host "CLEAN_SCRIPT_COMMANDS=$($commands -join ',')"

      - name: Execute exactly one cleaned script in isolated fixture
        shell: pwsh
        run: |
          $fixture = Join-Path $env:RUNNER_TEMP 'ava-safe-audit-fixture'
          New-Item -Path $fixture -ItemType Directory -Force | Out-Null

          @'
          Set-StrictMode -Version Latest
          [pscustomobject]@{ Status = 'fixture-ok'; Value = 1 }
          '@ | Set-Content -LiteralPath (Join-Path $fixture 'sample.ps1') -Encoding UTF8

          'fixture text' | Set-Content -LiteralPath (Join-Path $fixture 'sample.txt') -Encoding UTF8

          $before = @(
            Get-ChildItem -LiteralPath $fixture -File -Recurse |
              Sort-Object FullName |
              ForEach-Object {
                [pscustomobject]@{
                  Path = $_.FullName
                  Length = $_.Length
                  SHA256 = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash
                }
              }
          )

          $scriptPath = Join-Path $PWD 'scripts/AVA_SAFE_AUDIT_READONLY_NO_NETWORK.ps1'
          $json = & $scriptPath -AuditRoot $fixture
          $result = $json | ConvertFrom-Json

          $after = @(
            Get-ChildItem -LiteralPath $fixture -File -Recurse |
              Sort-Object FullName |
              ForEach-Object {
                [pscustomobject]@{
                  Path = $_.FullName
                  Length = $_.Length
                  SHA256 = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash
                }
              }
          )

          if (($before | ConvertTo-Json -Compress) -cne ($after | ConvertTo-Json -Compress)) {
            throw 'Fixture changed during read-only execution.'
          }

          if ($result.Mode -ne 'READ_ONLY_NO_NETWORK_NO_SYSTEM') {
            throw 'Unexpected audit mode.'
          }
          if ($result.FilesInventoried -ne 2) {
            throw "Expected 2 inventoried files, got $($result.FilesInventoried)."
          }
          if ($result.PowerShellParseFailures -ne 0) {
            throw 'Fixture PowerShell parsing failed.'
          }
          if ($result.FilesWithBlockedCommands -ne 0) {
            throw 'Blocked command detected in fixture.'
          }
          if ($result.FilesWithNetworkCommands -ne 0) {
            throw 'Network command detected in fixture.'
          }

          Write-Host 'ISOLATED_TEST=PASS'
          Write-Host ($result | ConvertTo-Json -Depth 12 -Compress)
