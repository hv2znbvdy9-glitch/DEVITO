name: AVA Safe Audit Verified

on:
  pull_request:
    branches: [main]
    paths:
      - 'audit/SAFE_AUDIT_TRIGGER.md'
      - 'scripts/AVA_SOC_CORE.ps1'
      - 'scripts/AVA_SOC_CORE_CLEANED.ps1'
      - 'tools/Invoke-AvaSafeAuditStatic.ps1'
      - '.github/workflows/safe-audit-verified-pr.yml'

permissions:
  contents: read

jobs:
  safe-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Build public PR merge tree without credentials
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet --branch main "https://github.com/$GITHUB_REPOSITORY.git" repo
          cd repo
          git fetch --quiet origin "$GITHUB_HEAD_REF"
          git -c user.name='AVA Safe Audit' -c user.email='ava-safe-audit@invalid' merge --quiet --no-edit FETCH_HEAD
          echo "[AVA] prepared merge tree for: $GITHUB_HEAD_REF"

      - name: Inventory, SHA-256, static parse and sanitization verification
        shell: pwsh
        working-directory: repo
        run: |
          ./tools/Invoke-AvaSafeAuditStatic.ps1 -OutputDirectory "$env:RUNNER_TEMP/ava-safe-audit"

      - name: Isolated test of exactly one cleaned script
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          docker pull --quiet mcr.microsoft.com/powershell:7.4-alpine-3.20
          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --user 65534:65534 \
            --env POWERSHELL_TELEMETRY_OPTOUT=1 \
            --env DOTNET_CLI_TELEMETRY_OPTOUT=1 \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=16m \
            --mount type=bind,src="$PWD/scripts/AVA_SOC_CORE_CLEANED.ps1",dst=/work/AVA_SOC_CORE_CLEANED.ps1,readonly \
            mcr.microsoft.com/powershell:7.4-alpine-3.20 \
            pwsh -NoLogo -NoProfile -NonInteractive -File /work/AVA_SOC_CORE_CLEANED.ps1 -SelfTest \
            | tee "$RUNNER_TEMP/ava-safe-audit/isolated-test.log"
          grep -Fq '[AVA][PASS]' "$RUNNER_TEMP/ava-safe-audit/isolated-test.log"
          echo '[AVA][ISOLATED-PASS] exactly one cleaned script executed successfully.'

      - name: Print audit summary
        if: always()
        shell: bash
        run: |
          echo '--- AVA SAFE AUDIT SUMMARY ---'
          test -f "$RUNNER_TEMP/ava-safe-audit/summary.json" && cat "$RUNNER_TEMP/ava-safe-audit/summary.json" || true
          test -f "$RUNNER_TEMP/ava-safe-audit/isolated-test.log" && cat "$RUNNER_TEMP/ava-safe-audit/isolated-test.log" || true

      - name: Upload evidence
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ava-safe-audit-verified-${{ github.run_id }}
          path: ${{ runner.temp }}/ava-safe-audit
          if-no-files-found: warn
          retention-days: 14
